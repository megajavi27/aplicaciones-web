<aside class="w-[260px] h-full bg-primary flex flex-col fixed left-0 top-0 overflow-y-auto text-on-primary">

    <span class="font-display text-xl font-bold text-on-primary tracking-wide">Hotel Bombay</span>
  </div>

  <nav class="flex-1 py-6 px-4 flex flex-col gap-2">
    <a routerLink="/usuarios" routerLinkActive="bg-primary-container text-secondary-container"
       class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-colors hover:bg-primary-container/50">
      <span class="material-symbols-outlined">group</span>
      Usuarios
    </a>
    <a routerLink="/perfiles" routerLinkActive="bg-primary-container text-secondary-container"
