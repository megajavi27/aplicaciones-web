<div class="bg-surface text-on-surface font-body overflow-x-hidden">

  <app-public-navbar></app-public-navbar>

  <!-- Hero -->
  <section class="relative h-[50vh] min-h-[360px] w-full flex items-center justify-center overflow-hidden">
    <div class="absolute inset-0 z-0">
      <img alt="Experiencias Hotel Bombay" class="w-full h-full object-cover"
           src="https://images.unsplash.com/photo-1540541338287-41700207dee6?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" />
      <div class="absolute inset-0 bg-primary/60"></div>
    </div>
    <div class="relative z-10 text-center px-6">
      <span class="font-medium text-sm text-secondary-container tracking-widest uppercase mb-4 block">Vida Curada</span>
      <h1 class="font-display text-4xl md:text-6xl font-bold text-white drop-shadow-lg">Experiencias y Amenidades</h1>
      <p class="font-body text-white/90 mt-4 max-w-xl mx-auto">Cada momento de tu estancia pensado para conectar contigo mismo y con el entorno.</p>
    </div>
  </section>

  <!-- Experiences Grid -->
  <section class="py-24 px-6 lg:px-16 max-w-7xl mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (exp of experiencias; track exp.titulo) {
        <div class="flex flex-col gap-4 p-8 bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow border border-outline-variant/20">
          <div class="bg-secondary-container/30 p-4 rounded-lg w-fit">
            <span class="material-symbols-outlined text-secondary text-3xl">{{ exp.icono }}</span>
          </div>
          <h4 class="font-display text-xl font-semibold text-primary">{{ exp.titulo }}</h4>
          <p class="text-sm text-on-surface-variant">{{ exp.descripcion }}</p>
        </div>
      }
    </div>
  </section>

  <app-public-footer></app-public-footer>

</div>
